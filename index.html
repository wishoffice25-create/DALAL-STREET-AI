<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Stock Agent | NSE & BSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <nav class="p-6 border-b border-gray-800 bg-gray-900 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-500 italic">INDIA<span class="text-white font-light text-sm">STOCK AI</span></h1>
            <div class="flex gap-4">
                <input id="stockInput" type="text" placeholder="Enter Symbol (e.g. RELIANCE)" class="bg-gray-800 border border-gray-700 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="analyzeStock()" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg font-semibold transition">Analyze</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <p class="text-gray-400 text-sm">Current Price (NSE)</p>
                <h2 id="price" class="text-4xl font-bold mt-2">₹0.00</h2>
                <span id="change" class="text-green-400 text-sm">--%</span>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <p class="text-gray-400 text-sm">P/E Ratio</p>
                <h2 id="pe" class="text-4xl font-bold mt-2">--</h2>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <p class="text-gray-400 text-sm">EPS (TTM)</p>
                <h2 id="eps" class="text-4xl font-bold mt-2">--</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h3 class="text-lg font-semibold mb-4">Price Trend (30 Days)</h3>
                <canvas id="stockChart" height="150"></canvas>
            </div>

            <div class="bg-blue-900/20 p-6 rounded-xl border border-blue-500/50">
                <h3 class="text-blue-400 font-bold uppercase tracking-wider text-sm mb-4">AI Agent Verdict</h3>
                <div id="recommendation" class="text-2xl font-bold mb-4">Awaiting Input...</div>
                <ul id="newsItems" class="text-sm text-gray-300 space-y-3">
                    <li>• Enter a ticker to see latest news analysis.</li>
                    <li>• AI will scan market sentiment.</li>
                </ul>
            </div>
        </div>
    </main>

    <script>
        let chart;
        function analyzeStock() {
            const ticker = document.getElementById('stockInput').value.toUpperCase();
            if(!ticker) return alert("Please enter a stock symbol");

            // Mock Data Generator (Simulating AI/Market Fetch)
            const mockPrice = (Math.random() * 2000 + 500).toFixed(2);
            const mockPE = (Math.random() * 30 + 10).toFixed(2);
            const mockEPS = (Math.random() * 100 + 10).toFixed(2);
            
            // Update UI
            document.getElementById('price').innerText = `₹${mockPrice}`;
            document.getElementById('pe').innerText = mockPE;
            document.getElementById('eps').innerText = mockEPS;
            document.getElementById('change').innerText = "+1.42% (Today)";

            // AI Logic Simulation
            const recs = ["BUY", "SELL", "HOLD"];
            const decision = recs[Math.floor(Math.random() * recs.length)];
            const recEl = document.getElementById('recommendation');
            recEl.innerText = decision;
            recEl.className = `text-2xl font-bold mb-4 ${decision === 'BUY' ? 'text-green-500' : decision === 'SELL' ? 'text-red-500' : 'text-yellow-500'}`;

            document.getElementById('newsItems').innerHTML = `
                <li>• RSI suggests stock is in ${decision === 'BUY' ? 'oversold' : 'fair'} territory.</li>
                <li>• Institutional buying increased by 2% this week.</li>
                <li>• Quarterly results expected to beat estimates.</li>
            `;

            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('stockChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 10}, (_, i) => `Day ${i+1}`),
                    datasets: [{
                        label: 'Price INR',
                        data: Array.from({length: 10}, () => Math.floor(Math.random() * 500 + 1500)),
                        borderColor: '#3b82f6',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(59, 130, 246, 0.1)'
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { grid: { color: '#374151' } }, x: { grid: { display: false } } }
                }
            });
        }
    </script>
</body>
</html>
