<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat AI Stock Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-border { box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen font-sans">

    <header class="p-5 glass sticky top-0 z-50 border-b border-slate-800">
        <div class="max-w-7xl mx-auto flex flex-col md:row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-emerald-500 p-2 rounded-lg text-black"><i class="fas fa-chart-line fa-lg"></i></div>
                <h1 class="text-xl font-bold tracking-tight">BHARAT<span class="text-emerald-500">AI</span> TERMINAL</h1>
            </div>
            <div class="flex gap-2 w-full md:w-96">
                <input id="symbol" type="text" placeholder="NSE Symbol (e.g. RELIANCE)" class="w-full bg-slate-900 border border-slate-700 px-4 py-2 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none uppercase text-sm">
                <button onclick="runAnalysis()" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded-xl font-bold transition-all text-sm whitespace-nowrap">ANALYZE</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="glass p-6 rounded-2xl">
                <p class="text-xs text-slate-400 uppercase font-bold mb-1">Last Traded Price</p>
                <div id="price" class="text-3xl font-mono font-bold text-white">₹0.00</div>
                <div id="change" class="text-sm mt-1">--</div>
            </div>
            <div class="glass p-6 rounded-2xl">
                <p class="text-xs text-slate-400 uppercase font-bold mb-1">Day High</p>
                <div id="high" class="text-xl font-bold text-emerald-400">₹0.00</div>
            </div>
            <div class="glass p-6 rounded-2xl">
                <p class="text-xs text-slate-400 uppercase font-bold mb-1">Day Low</p>
                <div id="low" class="text-xl font-bold text-red-400">₹0.00</div>
            </div>
            <div class="glass p-6 rounded-2xl bg-emerald-500/10 border-emerald-500/30">
                <p class="text-xs text-emerald-400 uppercase font-bold mb-1">Technical Signal</p>
                <div id="signal" class="text-xl font-bold">READY</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 glass p-6 rounded-2xl min-h-[400px]">
                <h3 class="text-sm font-bold text-slate-400 mb-4 uppercase italic">Technical Chart (Price Action)</h3>
                <div class="h-[350px] w-full">
                    <canvas id="stockChart"></canvas>
                </div>
            </div>

            <div class="glass p-6 rounded-2xl border-l-4 border-l-emerald-500 flex flex-col">
                <div class="flex items-center gap-2 mb-4">
                    <i class="fas fa-robot text-emerald-500"></i>
                    <h3 class="text-sm font-bold uppercase tracking-widest">Gemini AI Insights</h3>
                </div>
                <div id="aiLoader" class="hidden animate-pulse space-y-3">
                    <div class="h-4 bg-slate-800 rounded w-3/4"></div>
                    <div class="h-4 bg-slate-800 rounded w-full"></div>
                    <div class="h-4 bg-slate-800 rounded w-5/6"></div>
                </div>
                <div id="aiOutput" class="text-sm text-slate-300 leading-relaxed overflow-y-auto">
                    Enter a stock symbol to generate an AI technical analysis and news summary.
                </div>
            </div>
        </div>
    </main>

    <script>
        // CONFIG - PASTE YOUR KEYS HERE
        const TD_API_KEY = 'fdf2ab9f462140edbb9982503bb3c4c5';
        const GEMINI_API_KEY = 'gen-lang-client-0664481384';

        let chartInstance = null;

        async function runAnalysis() {
            const symbol = document.getElementById('symbol').value.toUpperCase();
            if (!symbol) return;

            // Reset UI
            document.getElementById('aiOutput').innerText = "";
            document.getElementById('aiLoader').classList.remove('hidden');

            try {
                // 1. Fetch Real Price Data
                const quoteRes = await fetch(`https://api.twelvedata.com/quote?symbol=${symbol}:NSE&apikey=${TD_API_KEY}`);
                const quote = await quoteRes.json();
                
                if (quote.status === "error") throw new Error(quote.message);

                updatePriceUI(quote);

                // 2. Fetch History for Chart
                const histRes = await fetch(`https://api.twelvedata.com/time_series?symbol=${symbol}:NSE&interval=1day&outputsize=15&apikey=${TD_API_KEY}`);
                const history = await histRes.json();
                renderChart(history.values);

                // 3. Ask Gemini for Recommendation
                generateAIRecommendation(symbol, quote);

            } catch (err) {
                alert("Error: " + err.message);
                document.getElementById('aiLoader').classList.add('hidden');
            }
        }

        function updatePriceUI(data) {
            document.getElementById('price').innerText = `₹${parseFloat(data.close).toFixed(2)}`;
            document.getElementById('high').innerText = `₹${parseFloat(data.high).toFixed(2)}`;
            document.getElementById('low').innerText = `₹${parseFloat(data.low).toFixed(2)}`;
            
            const change = parseFloat(data.percent_change).toFixed(2);
            const changeEl = document.getElementById('change');
            changeEl.innerText = `${change}% Today`;
            changeEl.className = change >= 0 ? 'text-emerald-400 text-sm' : 'text-red-400 text-sm';
            
            const signalEl = document.getElementById('signal');
            signalEl.innerText = change >= 0 ? 'BULLISH' : 'BEARISH';
            signalEl.className = `text-xl font-bold ${change >= 0 ? 'text-emerald-400' : 'text-red-400'}`;
        }

        function renderChart(values) {
            const ctx = document.getElementById('stockChart').getContext('2d');
            const labels = values.map(v => v.datetime).reverse();
            const prices = values.map(v => parseFloat(v.close)).reverse();

            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Price',
                        data: prices,
                        borderColor: '#10b981',
                        borderWidth: 3,
                        pointRadius: 4,
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }

        async function generateAIRecommendation(symbol, data) {
            const output = document.getElementById('aiOutput');
            const prompt = `Analyze stock ${symbol} at price ₹${data.close}. Change today is ${data.percent_change}%. Give a professional Indian market style recommendation (Buy/Hold/Sell) and mention 3 potential technical reasons. Keep it concise.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const result = await response.json();
                const aiText = result.candidates[0].content.parts[0].text;
                
                document.getElementById('aiLoader').classList.add('hidden');
                output.innerText = aiText;
            } catch (err) {
                output.innerText = "Gemini was unable to analyze this at the moment.";
            }
        }
    </script>
</body>
</html>
